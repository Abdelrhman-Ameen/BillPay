spring:
  application:
    name: BillPay
  datasource:
    url: ${DB_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:billpay}}
    username: ${DB_USERNAME:billpay}
    password: ${DB_PASSWORD:billpay}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  jackson:
    default-property-inclusion: non_null

server:
  port: ${PORT:8080}

app:
  security:
    jwt-secret: ${JWT_SECRET}
    token-lifetime-hours: 12
  admin:
    name: ${ADMIN_NAME:BillPay Admin}
    email: ${ADMIN_EMAIL:}
    password: ${ADMIN_PASSWORD:}
  seed:
    enabled: ${SEED_DATA:false}
