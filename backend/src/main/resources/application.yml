spring:
  application:
    name: BillPay
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/billpay}
    username: ${DB_USERNAME:billpay}
    password: ${DB_PASSWORD:billpay}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  jackson:
    default-property-inclusion: non_null

server:
  port: ${PORT:8080}

app:
  security:
    jwt-secret: ${JWT_SECRET:QmlsbFBheURlbW9TZWNyZXRLZXlGb3JEZXZlbG9wbWVudE9ubHkh}
    token-lifetime-hours: 12
  seed:
    enabled: ${SEED_DATA:true}
