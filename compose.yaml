services:
  db:
    image: postgres:16-alpine
    container_name: billpay-postgres
    environment:
      POSTGRES_DB: billpay
      POSTGRES_USER: billpay
      POSTGRES_PASSWORD: billpay
    ports:
      - "5432:5432"
    volumes:
      - billpay-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U billpay -d billpay"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  billpay-postgres-data:
